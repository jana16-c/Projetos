<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Processador de Tabelas de Processos Trabalhistas</title>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1>Processador de Tabelas de Processos Trabalhistas</h1>
    </header>

    <section class="panel form-layout">
      <div class="drop-zone" id="dropZone" tabindex="0">
        <input id="pdfInput" type="file" accept="application/pdf,.pdf" hidden />
        <div class="drop-icon">PDF</div>
        <button class="btn primary" id="selectPdfBtn" type="button">Escolher PDF</button>
        <p class="file-name" id="fileName">Nenhum arquivo selecionado</p>
        <p class="file-details" id="fileDetails">Arraste um PDF ou clique para escolher.</p>
      </div>

      <div class="controls">
        <div class="field">
          <label for="pageSpec">Paginas</label>
          <input id="pageSpec" name="pageSpec" type="text" placeholder="1-3, 5, 8-10" value="" />
          <small id="pageSelectionInfo" class="page-selection-info">Selecione um PDF para validar o intervalo de paginas.</small>
        </div>

        <div class="field">
          <label for="templateInput">Modelo XLSM</label>
          <div class="inline-actions">
            <button class="btn" id="selectTemplateBtn" type="button">Selecionar modelo</button>
            <span class="file-details" id="templateName">Nenhum modelo selecionado</span>
          </div>
          <input id="templateInput" type="file" accept=".xlsm,application/vnd.ms-excel.sheet.macroEnabled.12" hidden />
        </div>

        <div class="actions">
          <button class="btn primary" id="processBtn" type="button">Processar</button>
          <button class="btn" id="exportXlsxBtn" type="button" disabled>Exportar XLSX</button>
          <button class="btn" id="exportXlsmBtn" type="button" disabled>Exportar XLSM</button>
          <button class="btn" id="exportZipBtn" type="button" disabled>Exportar ZIP</button>
          <button class="btn subtle" id="clearBtn" type="button">Limpar</button>
        </div>
      </div>
    </section>

    <section class="panel status-panel">
      <div class="status-row">
        <strong>Status</strong>
        <span id="statusText" aria-live="polite">Aguardando PDF.</span>
      </div>
      <div class="progress" aria-label="Progresso"><div id="progressBar"></div></div>
    </section>
  </main>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
