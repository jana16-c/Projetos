<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Processador de Tabelas de Processos Trabalhistas</title>
  <script>
    window.__APP_VERSION__ = '2026-06-30-livepreview-3';
  </script>
  <link rel="stylesheet" href="assets/css/app.css?v=2026-06-30-livepreview-3" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <h1>Processador de Tabelas de Processos Trabalhistas</h1>
    </header>

    <section class="panel form-layout">
      <div class="drop-zone" id="dropZone" tabindex="0">
        <input id="pdfInput" type="file" accept="application/pdf,.pdf" hidden />
        <div class="drop-icon">PDF</div>
        <button class="btn primary" id="selectPdfBtn" type="button">Escolher PDF</button>
        <p class="file-name" id="fileName">Nenhum arquivo selecionado</p>
        <p class="file-details" id="fileDetails">Arraste um PDF ou clique para escolher.</p>
      </div>

      <div class="controls">
        <div class="field">
          <label for="pageSpec">Paginas</label>
          <input id="pageSpec" name="pageSpec" type="text" placeholder="1-3, 5, 8-10" value="" />
          <small id="pageSelectionInfo" class="page-selection-info">Selecione um PDF para validar o intervalo de paginas.</small>
        </div>

        <div class="field">
          <label for="templateInput">Modelo XLSM</label>
          <div class="inline-actions">
            <button class="btn" id="selectTemplateBtn" type="button">Selecionar modelo</button>
            <span class="file-details" id="templateName">Nenhum modelo selecionado</span>
          </div>
          <input id="templateInput" type="file" accept=".xlsm,application/vnd.ms-excel.sheet.macroEnabled.12" hidden />
        </div>

        <details class="advanced-options">
          <summary>Opções avançadas</summary>
          <div class="advanced-grid">
            <div class="field">
              <label for="sourceMode">Origem</label>
              <select id="sourceMode" name="sourceMode">
                <option value="auto" selected>Automático</option>
                <option value="hybrid">Híbrido</option>
                <option value="text">Texto PDF</option>
                <option value="ocr">OCR</option>
              </select>
            </div>

            <div class="field">
              <label for="outputMode">Saída</label>
              <select id="outputMode" name="outputMode">
                <option value="visual-replica">Replica visual</option>
                <option value="clean-table" selected>Tabela limpa</option>
              </select>
            </div>

            <div class="field">
              <label for="ocrDpi">OCR DPI</label>
              <input id="ocrDpi" name="ocrDpi" type="number" min="200" max="450" step="10" value="300" />
            </div>

            <div class="field">
              <label for="ocrMinConfidence">Confiança minima OCR</label>
              <input id="ocrMinConfidence" name="ocrMinConfidence" type="number" min="0" max="100" step="1" value="45" />
            </div>

            <div class="field advanced-span">
              <label for="ocrLanguages">Idiomas OCR</label>
              <input id="ocrLanguages" name="ocrLanguages" type="text" value="por+eng" />
            </div>

            <label class="toggle">
              <input id="detectBorders" type="checkbox" checked />
              <span>Detectar bordas</span>
            </label>

            <label class="toggle">
              <input id="detectColors" type="checkbox" checked />
              <span>Detectar cores</span>
            </label>

            <label class="toggle">
              <input id="mergeSplitRows" type="checkbox" checked />
              <span>Unir linhas quebradas</span>
            </label>

            <label class="toggle">
              <input id="keepPageImagesInAudit" type="checkbox" />
              <span>Guardar imagens na auditoria</span>
            </label>
          </div>
        </details>

        <div class="actions">
          <button class="btn primary" id="processBtn" type="button">Processar</button>
          <button class="btn" id="exportXlsxBtn" type="button" disabled>Exportar XLSX</button>
          <button class="btn" id="exportXlsmBtn" type="button" disabled>Exportar XLSM</button>
          <button class="btn" id="exportZipBtn" type="button" disabled>Exportar ZIP</button>
          <button class="btn subtle" id="clearBtn" type="button">Limpar</button>
        </div>
      </div>
    </section>

    <section class="panel status-panel">
      <div class="status-row">
        <strong>Status</strong>
        <span id="statusText" aria-live="polite">Aguardando PDF.</span>
      </div>
      <div class="progress" aria-label="Progresso"><div id="progressBar"></div></div>
    </section>
  </main>

  <script type="module" src="assets/js/main.js?v=2026-06-30-livepreview-3"></script>
</body>
</html>
